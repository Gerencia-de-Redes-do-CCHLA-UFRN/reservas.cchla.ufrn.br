<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Administração CCHLA</title>
  
  <style>
    :root { --azul-marinho: #051638; --azul-royal: #1653A1; --fundo-pagina: #f4f7fb; --borda-suave: #cbd5e1; --texto-escuro: #334155; }
    body { background-color: var(--fundo-pagina); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; color: var(--texto-escuro); margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
    
    .login-container { background: #ffffff; padding: 40px; border-radius: 12px; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1); width: 100%; max-width: 400px; border: 1px solid var(--borda-suave); box-sizing: border-box; }
    
    .header { text-align: center; margin-bottom: 30px; }
    .header img { max-height: 80px; margin-bottom: 15px; object-fit: contain; }
    .header h2 { margin: 0; color: var(--azul-marinho); font-size: 22px; font-weight: 700; }
    .header p { margin: 5px 0 0 0; font-size: 14px; color: #64748b; }

    .input-group { margin-bottom: 20px; }
    .input-group label { display: block; font-weight: 600; margin-bottom: 8px; font-size: 14px; color: var(--azul-marinho); }
    .input-group input { width: 100%; padding: 12px; border: 1px solid var(--borda-suave); border-radius: 6px; font-size: 15px; box-sizing: border-box; transition: border-color 0.2s; }
    .input-group input:focus { outline: none; border-color: var(--azul-royal); box-shadow: 0 0 0 3px rgba(22, 83, 161, 0.1); }
    
    .btn-submit { background-color: var(--azul-royal); color: #ffffff; padding: 12px; border: none; border-radius: 6px; font-size: 16px; font-weight: 600; cursor: pointer; width: 100%; transition: 0.2s; margin-top: 10px; }
    .btn-submit:hover { background-color: var(--azul-marinho); }
    .btn-submit:disabled { background-color: #94a3b8; cursor: not-allowed; }

    .error-msg { background-color: #fee2e2; color: #991b1b; padding: 10px; border-radius: 6px; font-size: 13px; text-align: center; margin-bottom: 20px; border: 1px solid #fecaca; display: none; }
  </style>
</head>
<body>

  <div class="login-container">
    <div class="header">
      <img src="cchla-logo.jpg" alt="Logo CCHLA">
      <h2>Acesso Restrito</h2>
      <p>Painel de Gestão de Reservas</p>
    </div>

    <div id="mensagemErro" class="error-msg"></div>

    <form id="formLogin">
      <div class="input-group">
        <label for="email">E-mail de Administrador</label>
        <input type="email" id="email" required placeholder="admin@ufrn.br">
      </div>
      
      <div class="input-group">
        <label for="senha">Senha</label>
        <input type="password" id="senha" required placeholder="••••••••">
      </div>

      <button type="submit" id="btnEntrar" class="btn-submit">Entrar no Painel</button>
    </form>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyB6sIfRwITVYmBqdaYzoiqIGxTBfPEvw4Q",
      authDomain: "formulario-reservas-cchla.firebaseapp.com",
      projectId: "formulario-reservas-cchla",
      storageBucket: "formulario-reservas-cchla.firebasestorage.app",
      messagingSenderId: "112276491941",
      appId: "1:112276491941:web:f67cc53ce868764ea6474c",
      measurementId: "G-4B1J48HDGF"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    document.getElementById('formLogin').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const email = document.getElementById('email').value;
      const senha = document.getElementById('senha').value;
      const btn = document.getElementById('btnEntrar');
      const msgErro = document.getElementById('mensagemErro');

      btn.innerText = 'Autenticando...';
      btn.disabled = true;
      msgErro.style.display = 'none';

      try {
        await signInWithEmailAndPassword(auth, email, senha);
        // Login com sucesso, redireciona para o painel
        window.location.href = 'painel.html';
      } catch (error) {
        console.error(error);
        msgErro.innerText = 'E-mail ou senha incorretos. Acesso negado.';
        msgErro.style.display = 'block';
        btn.innerText = 'Entrar no Painel';
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
