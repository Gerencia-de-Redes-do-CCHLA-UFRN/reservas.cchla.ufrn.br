<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acompanhamento de Solicitações - CCHLA</title>
  
  <style>
    :root { --azul-marinho: #051638; --azul-royal: #1653A1; --fundo-pagina: #f4f7fb; --borda-suave: #cbd5e1; --texto-escuro: #334155; }
    body { background-color: var(--fundo-pagina); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; color: var(--texto-escuro); margin: 0; padding: 20px; }
    .container { max-width: 900px; margin: 30px auto; padding: 30px; background-color: #ffffff; border-radius: 12px; border: 1px solid var(--borda-suave); box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
    .header { text-align: center; border-bottom: 3px solid var(--azul-royal); padding-bottom: 20px; margin-bottom: 25px; }
    .header img { max-height: 70px; margin-bottom: 15px; object-fit: contain; }
    .header h2 { margin: 0 0 10px 0; color: var(--azul-marinho); font-size: 24px; font-weight: 700; }
    
    .search-section { background-color: #f8fafc; padding: 20px; border-radius: 8px; border: 1px solid var(--borda-suave); margin-bottom: 30px; display: flex; gap: 15px; align-items: flex-end; }
    .search-group { flex: 1; }
    .search-group label { display: block; font-weight: 600; margin-bottom: 8px; font-size: 14px; color: var(--azul-marinho); }
    .search-group input { width: 100%; padding: 12px; border: 1px solid var(--borda-suave); border-radius: 6px; font-size: 16px; box-sizing: border-box; }
    .btn-buscar { background-color: var(--azul-royal); color: #ffffff; padding: 12px 24px; border: none; border-radius: 6px; font-size: 16px; font-weight: 600; cursor: pointer; height: 45px; }
    
    #areaResultados { display: none; }
    .dados-solicitante { display: flex; justify-content: space-between; align-items: center; background-color: #f0fdf4; border-left: 4px solid #16a34a; padding: 15px 20px; border-radius: 6px; margin-bottom: 25px; }
    .ticket-badge { background-color: var(--azul-marinho); color: white; padding: 8px 15px; border-radius: 20px; font-family: monospace; font-size: 20px; font-weight: bold; letter-spacing: 2px; }
    .table-responsive { overflow-x: auto; border: 1px solid var(--borda-suave); border-radius: 8px; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; text-align: left; }
    th, td { padding: 12px 15px; border-bottom: 1px solid #e2e8f0; vertical-align: middle; }
    th { background-color: #f1f5f9; color: var(--azul-marinho); font-weight: 700; }
    .status-msg { text-align: center; color: #ef4444; font-weight: 600; margin-top: 15px; display: none; }
    .btn-imprimir { background-color: #475569; color: white; padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer; margin-top: 20px; }

    /* Cores dos Status */
    .badge-status { padding: 6px 12px; border-radius: 6px; font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.5px; display: inline-block; white-space: nowrap; }
    .status-pendente { background-color: #fef08a; color: #854d0e; border: 1px solid #fde047; }
    .status-aprovada { background-color: #d1fae5; color: #065f46; border: 1px solid #a7f3d0; }
    .status-nao-atendida { background-color: #fee2e2; color: #991b1b; border: 1px solid #fecaca; }

    @media print {
      body { background-color: #ffffff; padding: 0; }
      .container { box-shadow: none; border: none; padding: 0; max-width: 100%; }
      .search-section, .btn-imprimir, .status-msg { display: none !important; }
      .header { border-bottom: 2px solid #000; padding-bottom: 10px; margin-bottom: 20px; }
      .dados-solicitante { border: 1px solid #000; border-left: 4px solid #000; }
      table, th, td { border: 1px solid #000; }
      /* Força a impressão das cores de fundo das etiquetas */
      .badge-status { -webkit-print-color-adjust: exact; print-color-adjust: exact; border: 1px solid #000; }
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="header">
      <img src="cchla-logo.jpg" alt="Logo CCHLA UFRN">
      <h2>Acompanhamento de Reservas</h2>
    </div>

    <div class="search-section no-print">
      <div class="search-group">
        <label>Digite seu Ticket (Ex: ABC1D23) ou Telefone:</label>
        <input type="text" id="inputBusca" placeholder="Ticket ou Telefone..." onkeypress="if(event.key === 'Enter') window.buscarSolicitacao()">
      </div>
      <button class="btn-buscar" id="btnBuscar" onclick="window.buscarSolicitacao()">Consultar</button>
    </div>

    <div id="mensagemErro" class="status-msg">Nenhum registro encontrado.</div>

    <div id="areaResultados">
      <div class="dados-solicitante">
        <div>
          <p><strong>Solicitante:</strong> <span id="resNome"></span></p>
          <p><strong>Telefone:</strong> <span id="resTelefone"></span></p>
        </div>
        <div><div class="ticket-badge" id="resTicket"></div></div>
      </div>

      <div class="table-responsive">
        <table>
          <thead>
            <tr>
              <th>Data da Solicitação</th>
              <th>Status</th>
              <th>Auditório</th>
              <th>Atividade</th>
              <th>Início</th>
            </tr>
          </thead>
          <tbody id="corpoTabelaResultados"></tbody>
        </table>
      </div>
      <button class="btn-imprimir no-print" onclick="window.print()">🖨️ Imprimir Comprovante</button>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, collection, getDocs, query, where, orderBy } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyB6sIfRwITVYmBqdaYzoiqIGxTBfPEvw4Q",
      authDomain: "formulario-reservas-cchla.firebaseapp.com",
      projectId: "formulario-reservas-cchla",
      storageBucket: "formulario-reservas-cchla.firebasestorage.app",
      messagingSenderId: "112276491941",
      appId: "1:112276491941:web:ec9d6c66ededaa37a6474c",
      measurementId: "G-8JVTMVDYTJ"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    window.buscarSolicitacao = async function() {
      const termoBusca = document.getElementById('inputBusca').value.trim();
      if (!termoBusca) return alert("Digite um Ticket ou Telefone.");

      document.getElementById('btnBuscar').innerText = "Buscando...";
      document.getElementById('mensagemErro').style.display = 'none';
      document.getElementById('areaResultados').style.display = 'none';

      try {
        const reservasRef = collection(db, "reservas");
        
        const qTicket = query(reservasRef, where("Ticket", "==", termoBusca.toUpperCase()));
        const qTel = query(reservasRef, where("Telefone", "==", termoBusca));

        const [snapT, snapTel] = await Promise.all([getDocs(qTicket), getDocs(qTel)]);
        
        let resultados = [];
        snapT.forEach(doc => resultados.push(doc.data()));
        snapTel.forEach(doc => {
            if (!resultados.some(r => r.Ticket === doc.data().Ticket && r.Início === doc.data().Início)) {
                resultados.push(doc.data());
            }
        });

        if (resultados.length === 0) {
          document.getElementById('mensagemErro').style.display = 'block';
          return;
        }

        resultados.sort((a, b) => {
          let tA = a.timestamp_criacao ? (a.timestamp_criacao.seconds || 0) : 0;
          let tB = b.timestamp_criacao ? (b.timestamp_criacao.seconds || 0) : 0;
          return tB - tA; 
        });

        const rRecente = resultados[0];
        document.getElementById('resNome').innerText = rRecente.Solicitante || '-';
        document.getElementById('resTelefone').innerText = rRecente.Telefone || '-';
        document.getElementById('resTicket').innerText = rRecente.Ticket || '-';

        const corpo = document.getElementById('corpoTabelaResultados');
        corpo.innerHTML = '';
        
        resultados.forEach(r => {
          let inicioFmt = r['Início'] ? r['Início'].replace('T', ' às ') : '-';
          
          // Lógica de definição visual do Status
          let statusBD = r.Status || 'Pendente';
          let classeStatus = 'status-pendente';
          let textoStatus = 'Pendente';

          if (statusBD === 'Aprovado' || statusBD === 'Aprovada') {
            classeStatus = 'status-aprovada';
            textoStatus = 'Aprovada';
          } else if (statusBD === 'Reprovado' || statusBD === 'Reprovada' || statusBD === 'Não atendida') {
            classeStatus = 'status-nao-atendida';
            textoStatus = 'Não Atendida'; // Converte o termo interno para o termo mais amigável pedido
          }

          corpo.innerHTML += `
            <tr>
              <td>${r.Data_Solicitacao || '-'}</td>
              <td><span class="badge-status ${classeStatus}">${textoStatus}</span></td>
              <td><strong>${r.Auditório || '-'}</strong></td>
              <td>${r.Atividade || '-'}</td>
              <td>${inicioFmt}</td>
            </tr>
          `;
        });

        document.getElementById('areaResultados').style.display = 'block';
      } catch (e) {
        console.error(e);
        document.getElementById('mensagemErro').innerText = "Erro ao acessar o banco. Verifique as regras do Firebase.";
        document.getElementById('mensagemErro').style.display = 'block';
      } finally {
        document.getElementById('btnBuscar').innerText = "Consultar";
      }
    };
  </script>
</body>
</html>
