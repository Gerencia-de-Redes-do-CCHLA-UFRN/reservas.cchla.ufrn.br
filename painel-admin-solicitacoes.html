<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel Administrativo - Reservas</title>
  
  <style>
    :root { --azul-marinho: #051638; --azul-royal: #1653A1; --fundo-pagina: #f4f7fb; --borda-suave: #cbd5e1; --texto-escuro: #1e293b; --texto-claro: #64748b; }
    body { background-color: var(--fundo-pagina); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; margin: 0; padding: 20px; color: var(--texto-escuro); }
    .container { max-width: 1400px; margin: 0 auto; background: #ffffff; padding: 30px; border-radius: 12px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
    
    .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid var(--azul-royal); padding-bottom: 20px; margin-bottom: 25px; }
    .branding { display: flex; align-items: center; gap: 20px; }
    .branding img { height: 60px; object-fit: contain; }
    .branding h1 { color: var(--azul-marinho); margin: 0; font-size: 26px; font-weight: 700; }
    .status-indicador { font-size: 13px; color: #10b981; font-weight: 600; background-color: #d1fae5; padding: 6px 12px; border-radius: 20px; }
    
    .filtros-painel { background-color: #f8fafc; border: 1px solid var(--borda-suave); border-left: 5px solid var(--azul-royal); border-radius: 8px; padding: 20px; margin-bottom: 35px; display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; align-items: end; }
    .filtro-grupo { display: flex; flex-direction: column; gap: 6px; }
    .filtro-grupo label { font-size: 13px; font-weight: 600; color: var(--azul-marinho); }
    .filtro-grupo input, .filtro-grupo select { padding: 10px; border: 1px solid var(--borda-suave); border-radius: 6px; font-size: 14px; color: var(--texto-escuro); }
    .btn-limpar { background-color: #e2e8f0; border: 1px solid var(--borda-suave); padding: 10px 15px; border-radius: 6px; font-size: 14px; font-weight: 600; cursor: pointer; height: 40px; }
    
    .header-lista { background-color: var(--azul-marinho); color: #ffffff; padding: 15px 20px; margin: 0 0 20px 0; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; }
    .titulo-tabela { margin: 0; font-size: 18px; font-weight: 600; display: flex; align-items: center; gap: 15px; }
    .contador-registros { font-size: 13px; background: rgba(255,255,255,0.2); padding: 4px 10px; border-radius: 12px; }
    .seletor-paginacao { display: flex; align-items: center; gap: 10px; font-size: 13px; }
    .seletor-paginacao select { padding: 6px 12px; border-radius: 4px; border: none; font-weight: bold; cursor: pointer; color: var(--azul-marinho); }

    .grid-cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(380px, 1fr)); gap: 20px; }
    .reserva-card { background: #ffffff; border: 1px solid var(--borda-suave); border-radius: 10px; overflow: hidden; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); display: flex; flex-direction: column; }
    .card-header { background-color: #f1f5f9; border-bottom: 1px solid var(--borda-suave); padding: 12px 18px; display: flex; justify-content: space-between; align-items: center; }
    .card-ticket { font-family: monospace; font-size: 16px; font-weight: 800; color: var(--azul-royal); }
    .card-auditorio { background-color: var(--azul-marinho); color: #fff; padding: 4px 10px; border-radius: 6px; font-size: 12px; font-weight: 600; }
    .card-body { padding: 18px; flex: 1; display: flex; flex-direction: column; gap: 12px; }
    .info-bloco { display: flex; flex-direction: column; }
    .info-label { font-size: 11px; text-transform: uppercase; color: var(--texto-claro); font-weight: 700; margin-bottom: 3px; }
    .info-valor { font-size: 14px; font-weight: 500; }
    .card-datas { display: flex; justify-content: space-between; background-color: #f8fafc; padding: 12px; border-radius: 6px; border: 1px dashed var(--borda-suave); }
    .card-footer { background-color: #f8fafc; padding: 12px 18px; border-top: 1px solid var(--borda-suave); font-size: 12px; color: var(--texto-claro); display: flex; justify-content: space-between; }
    
    .status-msg { text-align: center; color: var(--texto-claro); padding: 30px; grid-column: 1 / -1; }
    .paginacao-container { display: flex; justify-content: center; gap: 5px; margin-top: 35px; }
    .btn-page { background: #ffffff; border: 1px solid var(--borda-suave); padding: 8px 14px; border-radius: 6px; cursor: pointer; font-weight: 600; font-size: 14px; }
    .btn-page.active { background: var(--azul-royal); color: #ffffff; cursor: default; }
    .btn-page:disabled { opacity: 0.4; cursor: not-allowed; }
  </style>
</head>
<body>

  <div class="container">
    <div class="header">
      <div class="branding">
        <img src="cchla-logo.jpg" alt="Logo CCHLA">
        <h1>Painel de Reservas</h1>
      </div>
      <span class="status-indicador" id="statusSincronizacao">Buscando na Nuvem...</span>
    </div>
    
    <div class="filtros-painel">
      <div class="filtro-grupo">
        <label>Busca Geral</label>
        <input type="text" id="buscaGeral" placeholder="Qualquer termo..." onkeyup="resetarEFiltar()">
      </div>
      <div class="filtro-grupo">
        <label>Auditório</label>
        <select id="filtroAuditorio" onchange="resetarEFiltar()">
          <option value="">Todos</option>
          <option value="Auditorio A">Auditório 'A'</option>
          <option value="Auditorio B">Auditório 'B'</option>
          <option value="Auditorio C">Auditório 'C'</option>
          <option value="Auditorio D">Auditório 'D'</option>
          <option value="Auditorio E">Auditório 'E'</option>
        </select>
      </div>
      <div class="filtro-grupo">
        <label>Solicitante</label>
        <input type="text" id="filtroSolicitante" placeholder="Nome/Matrícula" onkeyup="resetarEFiltar()">
      </div>
      <div class="filtro-grupo">
        <label>Data Atividade</label>
        <input type="date" id="filtroDataAtividade" onchange="resetarEFiltar()">
      </div>
      <button class="btn-limpar" onclick="limparFiltros()">Limpar Filtros</button>
    </div>

    <div class="header-lista">
      <div class="titulo-tabela">Lista de Reservas <span class="contador-registros" id="contadorRegistros">0 encontrados</span></div>
      <div class="seletor-paginacao">
        <label>Por página:</label>
        <select id="selectItensPagina" onchange="mudarItensPorPagina()">
          <option value="10" selected>10</option> 
          <option value="20">20</option>
          <option value="100">100</option>
          <option value="500">500</option>
          <option value="todos">Todos</option>
        </select>
      </div>
    </div>
    
    <div id="gridCards" class="grid-cards"><div class="status-msg">Conectando ao Firestore...</div></div>
    <div id="paginacao" class="paginacao-container"></div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    // 🔴 INSIRA SUAS CHAVES DO FIREBASE AQUI
    const firebaseConfig = {
      apiKey: "SUA_API_KEY",
      authDomain: "SEU_PROJETO.firebaseapp.com",
      projectId: "SEU_PROJETO"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let dadosBrutos = [];       
    let dadosFiltrados = [];    
    let paginaAtual = 1;        
    let itensPorPagina = 10;    

    async function carregarFirestore(manterPagina = false) {
      try {
        // Busca da coleção inteira e ordena do mais recente pro antigo direto no banco
        const q = query(collection(db, "reservas"), orderBy("timestamp_criacao", "desc"));
        const querySnapshot = await getDocs(q);
        
        dadosBrutos = [];
        querySnapshot.forEach((doc) => {
          dadosBrutos.push(doc.data());
        });

        const agora = new Date();
        document.getElementById('statusSincronizacao').innerText = `Atualizado às ${agora.getHours().toString().padStart(2, '0')}:${agora.getMinutes().toString().padStart(2, '0')}`;
        
        window.aplicarFiltros(manterPagina);
      } catch (erro) {
        console.error(erro);
        document.getElementById('gridCards').innerHTML = `<div class="status-msg" style="color:red;">Erro de Leitura Firebase. Regras configuradas?</div>`;
      }
    }

    function formatarDataGMT3(dataString) {
      if (!dataString) return '-';
      let t = String(dataString);
      if (t.includes('T')) return t.split('T')[0].split('-').reverse().join('/') + ' às ' + t.split('T')[1].substring(0,5);
      return t;
    }

    // Expondo as funções para os eventos HTML
    window.limparFiltros = function() {
      document.getElementById("buscaGeral").value = "";
      document.getElementById("filtroAuditorio").value = "";
      document.getElementById("filtroSolicitante").value = "";
      document.getElementById("filtroDataAtividade").value = "";
      window.aplicarFiltros(false);
    };

    window.resetarEFiltar = function() { window.aplicarFiltros(false); };

    window.aplicarFiltros = function(manterPagina) {
      const fGeral = document.getElementById("buscaGeral").value.toLowerCase();
      const fAuditorio = document.getElementById("filtroAuditorio").value.toLowerCase();
      const fSolicitante = document.getElementById("filtroSolicitante").value.toLowerCase();
      const inputDataAtiv = document.getElementById("filtroDataAtividade").value; 

      dadosFiltrados = dadosBrutos.filter(d => {
        const txtGeral = Object.values(d).join(' ').toLowerCase();
        const aud = String(d.Auditório || '').toLowerCase();
        const sol = String(d.Solicitante || '').toLowerCase();
        const ativ = String(d.Início || '');

        return (fGeral === "" || txtGeral.includes(fGeral)) &&
               (fAuditorio === "" || aud.includes(fAuditorio)) &&
               (fSolicitante === "" || sol.includes(fSolicitante)) &&
               (inputDataAtiv === "" || ativ.includes(inputDataAtiv));
      });

      if (!manterPagina) paginaAtual = 1;
      document.getElementById('contadorRegistros').innerText = `${dadosFiltrados.length} encontrado(s)`;
      renderizarPaginaVisual();
    };

    window.mudarItensPorPagina = function() {
      const v = document.getElementById('selectItensPagina').value;
      itensPorPagina = v === 'todos' ? 'todos' : parseInt(v);
      paginaAtual = 1;
      renderizarPaginaVisual();
    };

    window.irParaPagina = function(p) {
      if (itensPorPagina === 'todos') return;
      paginaAtual = p;
      renderizarPaginaVisual();
    };

    function renderizarPaginaVisual() {
      const grid = document.getElementById('gridCards');
      grid.innerHTML = '';

      if (dadosFiltrados.length === 0) {
        grid.innerHTML = '<div class="status-msg">Nenhum resultado corresponde à busca.</div>';
        desenharPaginacao();
        return;
      }

      let dadosDaPag = itensPorPagina === 'todos' ? dadosFiltrados : dadosFiltrados.slice((paginaAtual - 1) * itensPorPagina, paginaAtual * itensPorPagina);

      dadosDaPag.forEach(d => {
        const card = document.createElement('div');
        card.className = 'reserva-card';
        card.innerHTML = `
          <div class="card-header"><span class="card-ticket">🎟️ ${d.Ticket || '-'}</span><span class="card-auditorio">${d.Auditório || '-'}</span></div>
          <div class="card-body">
            <div class="info-bloco"><span class="info-label">Atividade</span><span class="info-valor" style="font-weight:700; color:var(--azul-marinho);">${d.Atividade || '-'}</span></div>
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
              <div class="info-bloco"><span class="info-label">Solicitante</span><span class="info-valor">${d.Solicitante || '-'}</span></div>
              <div class="info-bloco"><span class="info-label">Depto</span><span class="info-valor">${d.Departamento || '-'}</span></div>
            </div>
            <div class="card-datas">
              <div class="info-bloco"><span class="info-label" style="color:#10b981;">▶ Início</span><span class="info-valor" style="font-size:13px;">${formatarDataGMT3(d.Início)}</span></div>
              <div class="info-bloco" style="text-align:right;"><span class="info-label" style="color:#ef4444;">⏹ Fim</span><span class="info-valor" style="font-size:13px;">${formatarDataGMT3(d.Fim)}</span></div>
            </div>
          </div>
          <div class="card-footer"><span>📞 ${d.Telefone || '-'}</span><span>Enviado: ${d.Data_Solicitacao || '-'}</span></div>
        `;
        grid.appendChild(card);
      });
      desenharPaginacao();
    }

    function desenharPaginacao() {
      const c = document.getElementById('paginacao');
      c.innerHTML = '';
      if (itensPorPagina === 'todos') return; 
      const total = Math.ceil(dadosFiltrados.length / itensPorPagina);
      if (total <= 1) return; 

      const bP = document.createElement('button'); bP.className = 'btn-page'; bP.innerText = '«'; bP.disabled = (paginaAtual === 1);
      bP.onclick = () => window.irParaPagina(paginaAtual - 1); c.appendChild(bP);

      for (let p = Math.max(1, paginaAtual - 2); p <= Math.min(total, paginaAtual + 2); p++) {
        const b = document.createElement('button'); b.className = 'btn-page'; b.innerText = p; if(p === paginaAtual) b.classList.add('active');
        b.onclick = () => window.irParaPagina(p); c.appendChild(b);
      }

      const bN = document.createElement('button'); bN.className = 'btn-page'; bN.innerText = '»'; bN.disabled = (paginaAtual === total);
      bN.onclick = () => window.irParaPagina(paginaAtual + 1); c.appendChild(bN);
    }

    carregarFirestore();
    setInterval(() => carregarFirestore(true), 30000); // Live update sem quebrar a página da pessoa
  </script>
</body>
</html>
