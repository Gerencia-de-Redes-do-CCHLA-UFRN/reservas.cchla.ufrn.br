<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <link rel="alternate icon" href="/favicon.ico" sizes="any">
    <title>Site em Construção - CCHLA/UFRN</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,400;0,600;0,800;1,400&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Montserrat', sans-serif;
        }

        body {
            background-color: #ffffff;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px; /* Reduzido um pouco para deixar mais compacto */
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Layout em duas colunas */
        .content-wrapper {
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            gap: 50px;
        }

        /* Seção de Texto (Agora com a logo) */
        .text-section {
            flex: 1;
            text-align: center;
            max-width: 450px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Nova classe para a logo acima do texto */
        .logo-interna {
            max-width: 250px; /* Tamanho da logo ajustado */
            height: auto;
            margin-bottom: 30px;
        }

        /* Aplicando os tons de Azul da Logo */
        .text-section h1 {
            color: #001A4E;
            font-size: 3rem; /* Levemente reduzido para equilibrar */
            font-weight: 800;
            text-transform: uppercase;
            margin-bottom: 5px;
            letter-spacing: 1px;
        }

        .text-section h2 {
            color: #004B9B;
            font-size: 1.3rem;
            font-style: italic;
            font-weight: 400;
            margin-bottom: 20px;
        }

        .text-section p {
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 30px;
            color: #444;
        }

        /* Botão com as cores da Logo */
        .btn-link {
            display: inline-block;
            background-color: #004B9B;
            color: #ffffff;
            text-decoration: none;
            padding: 15px 40px;
            border-radius: 30px;
            font-weight: 600;
            font-size: 1rem;
            transition: background-color 0.3s ease, transform 0.2s ease;
            width: 100%;
            max-width: 320px;
        }

        .btn-link:hover {
            background-color: #001A4E;
            transform: scale(1.02);
        }

        /* Redes Sociais com as cores da Logo */
        .social-links {
            margin-top: 35px;
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        .social-links a {
            color: #001A4E;
            font-size: 1.8rem;
            text-decoration: none;
            transition: color 0.3s ease, transform 0.2s ease;
        }

        .social-links a:hover {
            color: #004B9B;
            transform: translateY(-3px);
        }

        /* Seção da Imagem (Liquidificador) */
        .image-section {
            flex: 1;
            display: flex;
            justify-content: center;
        }

        .image-section img {
            width: 100%;
            max-width: 350px; /* Reduzido o tamanho do liquidificador */
            height: auto;
        }

        /* Responsividade para celulares */
        @media (max-width: 768px) {
            .content-wrapper {
                flex-direction: column; /* Coloca o texto em cima e imagem embaixo no celular */
                text-align: center;
                gap: 30px;
            }

            .logo-interna {
                max-width: 200px;
            }

            .text-section h1 {
                font-size: 2.5rem;
            }

            .text-section h2 {
                font-size: 1.2rem;
            }

            .image-section img {
                max-width: 280px; /* Liquidificador ainda menor no celular */
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <main class="content-wrapper">
            
            <div class="text-section">
                <img src="cchla-logo.jpg" alt="Logo CCHLA UFRN" class="logo-interna">
                
                <h1>Desculpe!</h1>
                <h2>Nosso site está em construção</h2>
                <p>Estamos preparando algo para você.</p>
                
                <a href="https://cchla.ufrn.br" target="_blank" class="btn-link">Site do CCHLA/UFRN</a>
                
                <div class="social-links">
                    <a href="https://web.facebook.com/cchla" target="_blank" title="Facebook"><i class="fab fa-facebook-f"></i></a>
                    <a href="https://x.com/cchla_ufrn" target="_blank" title="X (Twitter)"><i class="fa-brands fa-x-twitter"></i></a>
                    <a href="https://www.instagram.com/cchla.ufrn" target="_blank" title="Instagram"><i class="fab fa-instagram"></i></a>
                </div>
            </div>

            <div class="image-section">
                <img src="404-liqui.png" alt="Ilustração de um liquidificador">
            </div>

        </main>
    </div>

</body>
</html>
