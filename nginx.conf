server {
    listen 80;
    server_name reservas.cchla.ufrn.br localhost;

    set_real_ip_from 0.0.0.0/0;
    real_ip_header X-Real-IP;
    real_ip_recursive on;

    # API Reverse Proxy
    location /api/ {
        proxy_pass http://backend:3000/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # Mongo Express
    location /db-admin/ {
        # Restringir acesso para IPs específicos (UFRN e Local/SSH Tunnel)
        allow 127.0.0.1;
        allow 10.0.0.0/8;
        deny all;

        proxy_pass http://mongo-express:8081;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # App Calendario (Principal)
    location / {
        root /usr/share/nginx/html/app-calendario;
        index calendario.html index.html;
        try_files $uri $uri/ /calendario.html;
    }

    # App Formulario
    location /formulario {
        alias /usr/share/nginx/html/app-formulario/;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # App Acompanhamento
    location /acompanhamento {
        alias /usr/share/nginx/html/app-acompanhamento/;
        index acompanhamento.html index.html;
        try_files $uri $uri/ /acompanhamento.html;
    }

    # App Painel (Admin)
    location /admin {
        alias /usr/share/nginx/html/app-painel/;
        index painel.html index.html;
        try_files $uri $uri/ /painel.html;
    }
}
