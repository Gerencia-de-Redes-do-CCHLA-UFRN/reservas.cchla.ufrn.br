version: '3.8'

services:
  mongodb:
    image: mongo:6
    container_name: reservas-mongodb
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
      MONGO_INITDB_DATABASE: reservas_db
    volumes:
      - mongodb_data:/data/db
    networks:
      - default

  mongo-express:
    image: mongo-express
    container_name: reservas-mongo-express
    restart: always
    environment:
      - ME_CONFIG_MONGODB_ADMINUSERNAME=${MONGO_USER}
      - ME_CONFIG_MONGODB_ADMINPASSWORD=${MONGO_PASSWORD}
      - ME_CONFIG_MONGODB_URL=mongodb://${MONGO_USER}:${MONGO_PASSWORD}@mongodb:27017/
      - ME_CONFIG_BASICAUTH_USERNAME=suporte
      - ME_CONFIG_BASICAUTH_PASSWORD=${MONGO_PASSWORD}
      - ME_CONFIG_SITE_BASEURL=/db-admin/
    depends_on:
      - mongodb
    networks:
      - default

  backend:
    build:
      context: ./backend
    container_name: reservas-backend
    restart: always
    environment:
      - MONGO_URI=mongodb://${MONGO_USER}:${MONGO_PASSWORD}@mongodb:27017/reservas_db?authSource=admin
      - PORT=3000
      - JWT_SECRET=${JWT_SECRET}
      - RECAPTCHA_SECRET=${RECAPTCHA_SECRET}
      - EMAIL_USER=${EMAIL_USER}
      - EMAIL_PASS=${EMAIL_PASS}
    depends_on:
      - mongodb
    networks:
      - default

  frontend:
    build:
      context: .
      dockerfile: frontend.Dockerfile
    container_name: reservas-frontend
    restart: always
    environment:
      - VIRTUAL_HOST=reservas.cchla.ufrn.br
      - VIRTUAL_PORT=80
    depends_on:
      - backend
    networks:
      - default
      - web_gateway

volumes:
  mongodb_data:

networks:
  default:
  web_gateway:
    external: true
